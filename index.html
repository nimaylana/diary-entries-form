<script>
function insertEmoji(fieldId, emoji) {
    const textarea = document.getElementById(fieldId);
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    textarea.setRangeText(emoji, start, end, 'end');
    textarea.focus();
}

const tags = {
  sa:{location:[],general:["Extern"]},
  so:{location:[],general:["Extern"]},
  mo:{location:[],general:["Extern"]},
  di:{location:[],general:["Extern"]},
  mi:{location:[],general:["Extern"]},
  do:{location:[],general:["Extern"]},
  fr:{location:[],general:["Extern"]},
};

function addTag(id,type,value){
  value = value.trim();
  if(!value) return;

  if(!tags[id][type].includes(value)){
    tags[id][type].push(value);
  }
  renderTags(id);
}

function removeTag(id,type,value){
  tags[id][type] = tags[id][type].filter(t=>t!==value);
  renderTags(id);
}

function renderTags(id){
  const box = document.getElementById(id+'-tags');
  box.innerHTML='';

  ['general','location'].forEach(type=>{
    tags[id][type].forEach(t=>{
      const el=document.createElement('span');
      el.className='tag';
      el.textContent=t;
      el.onclick=()=>removeTag(id,type,t);
      box.appendChild(el);
    });
  });
}

function formatDate(baseDate, offset){
  const d = new Date(baseDate);
  d.setDate(d.getDate()+offset);

  const months=["Jänner","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  const weekdays=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];

  const day=String(d.getDate()).padStart(2,'0');

  return {
    date:d,
    title:`${day}\. ${months[d.getMonth()]} ${d.getFullYear()} / ${weekdays[d.getDay()]}`
  };
}

function getCenEUOffset(date){
  const offsetMin = -date.getTimezoneOffset();

  const sign = offsetMin >= 0 ? "+" : "-";
  const abs = Math.abs(offsetMin);
  const hh = String(Math.floor(abs / 60)).padStart(2,'0');
  const mm = String(abs % 60).padStart(2,'0');

  return {
    offset: `${sign}${hh}:${mm}`,
    label: offsetMin === 120 ? "CEST" : "CET"
  };
}

function saveMd(id,offset){
  const base=document.getElementById('startDate').value;
  if(!base) return alert("Set start date");

  const {date,title}=formatDate(base,offset);

  const text=document.getElementById(id).value;

  // create local 23:59 date in system timezone (central Europe)
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 23, 59, 0);
  const tz = getCenEUOffset(d);

  const created = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} 23:59:00${tz.offset}`;

  const allTags=[
    ...tags[id].general.map(t=>t.toLowerCase()),
    ...tags[id].location.map(t=>t.toLowerCase())
  ];

  const md =
`---
title: ${title}
created: ${created}
tags:
${allTags.map(t=>`  - ${t}`).join("\n")}
---

# ${title}

${text}

🏷️ ${tags[id].general.join(", ") || "-"}
📍 ${tags[id].location.join(", ") || "-"}`;

  const blob=new Blob([md],{type:"text/markdown"});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${id}.md`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function copyToClipboard(fieldId) {
    const textarea = document.getElementById(fieldId);
    textarea.select();

    // Use the Clipboard API
    navigator.clipboard.writeText(textarea.value).then(() => {
        console.log('Text copied to clipboard');
    }).catch(err => {
        console.error('Failed to copy text: ', err);
    });
}
